<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Futuristic Hotspot - Logged Out</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-animation"></div>

    <div class="glass-card">
        <div class="header">
            <div style="font-size: 3rem; margin-bottom: 20px;">
                <i class="fas fa-shield-halved" style="color: var(--accent-purple);"></i>
            </div>
            <h1>SESSION CLOSED</h1>
            <p>You have been safely disconnected from the network</p>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="label">USER</div>
                <div class="value">$(username)</div>
            </div>
            <div class="stat-card">
                <div class="label">FINAL UPTIME</div>
                <div class="value">$(uptime)</div>
            </div>
            <div class="stat-card full-width">
                <div class="label">TOTAL DATA TRANSFERRED</div>
                <div class="value">$(bytes-in-nice) / $(bytes-out-nice)</div>
            </div>
        </div>

        <button class="btn-primary" onclick="document.location='$(link-login)'">
            RETURN TO LOGIN <i class="fas fa-rotate-left" style="margin-left: 10px;"></i>
        </button>

        <div style="text-align: center; margin-top: 25px; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">
            Secure Logout Protocol Complete
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
