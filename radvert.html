<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2; url=$(link-orig)">
    <title>WiFi | Advertisement</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        var popup = "";
        function openOrig() {
            if (window.focus) popup.focus();
            location.href = unescape("$(link-orig-esc)");
        }
        function openAd() {
            location.href = unescape("$(link-redirect-esc)");
        }
        function openAdvert() {
            if (window.name != "hotspot_advert") {
                popup = open("$(link-redirect)", "hotspot_advert", "");
                setTimeout("openOrig()", 1000);
                return;
            }
            setTimeout("openAd()", 1000);
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full" onLoad="openAdvert()">
    <div class="bg-mesh"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10" title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z"/></svg>
    </button>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
        <div class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin"></div>
    </div>

    <div class="glass-card max-w-sm w-full">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-cyan-500/10 border border-cyan-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 animate-float">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-cyan-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M7 20h10"/><path d="M12 16v4"/><path d="M8 8h1"/><path d="M12 8h1"/><path d="M16 8h1"/></svg>
            </div>
            <h1 class="text-3xl font-semibold tracking-widest text-cyan-500 dark:text-neon-blue bg-clip-text uppercase">Sponsored Access</h1>
            <p class="text-[10px] text-slate-400 dark:text-white/70 mt-1 uppercase tracking-widest leading-relaxed">Authentication redirected. Opening advertisement...</p>
        </div>

        <div class="flex justify-center mb-8">
            <div class="w-12 h-12 border-4 border-black/5 dark:border-white/10 border-t-cyan-500 rounded-full animate-spin"></div>
        </div>

        <div class="bg-black/5 dark:bg-white/5 p-4 rounded-xl text-[10px] text-slate-500 dark:text-white/60 mb-8 text-center leading-relaxed italic">
            If nothing happens, open 
            <a href="$(link-redirect)" target="hotspot_advert" class="text-cyan-500 dark:text-neon-blue font-bold hover:underline">advertisement manually</a>.
        </div>

        <button class="neon-btn group uppercase tracking-widest text-xs italic" onclick="openOrig()">
            Continue to Destination
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:translate-x-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

        <div class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
            Powered by Zen — v2.0.0
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
