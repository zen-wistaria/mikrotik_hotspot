<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@config('flogin.meta.title')</title>
  <meta name="description" content="@config('flogin.meta.description')">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-stone-50 text-zinc-900 dark:bg-zinc-900 dark:text-stone-100 font-space min-h-screen flex items-center justify-center overflow-x-hidden p-4">

  <!-- Theme Toggle -->
  <button
    class="theme-toggle fixed top-4 right-4 w-10 h-10 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 flex items-center justify-center bg-stone-50 dark:bg-zinc-900 z-50 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors"
    title="Toggle Theme" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
    </svg>
  </button>

  <!-- Loader -->
  <div id="loader" class="fixed inset-0 bg-stone-50 dark:bg-zinc-900 z-50 hidden items-center justify-center">
    <div class="w-10 h-10 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 animate-spin"></div>
  </div>

  <div class="border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 p-6 md:p-8 w-full max-w-md mx-auto animate-fade-in-up">
    <div class="text-center mb-8">
      <div class="w-16 h-16 border-2 rounded-xl shadow-brutal-red dark:shadow-brutal-red border-red-500 flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      <h1 class="text-xl font-space tracking-widest text-red-600 dark:text-red-400 uppercase">
        @config('flogin.title')
      </h1>
      <p class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mt-1">
        @config('flogin.description')
      </p>
    </div>

    <div class="border-2 rounded-xl shadow-brutal-red dark:shadow-brutal-red border-red-500 p-4 text-red-600 dark:text-red-400 text-sm mb-6 text-center font-bold">
      $(error)
    </div>

    <button class="w-full px-6 py-4 rounded-xl border-2 border-stone-50 dark:border-zinc-900 shadow-brutal dark:shadow-brutal-dark bg-zinc-900 text-stone-50 dark:bg-stone-50 dark:text-zinc-900 text-sm uppercase tracking-widest hover:bg-zinc-800 dark:hover:bg-stone-200 transition-all active:translate-y-1 active:shadow-none flex items-center justify-center gap-2" type="button"
      onclick="window.location.href = '$(link-login)'">
      @config(flogin.button)
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12" />
        <polyline points="12 5 19 12 12 19" />
      </svg>
    </button>

    <div class="text-center mt-10 text-xs uppercase tracking-[0.3em] text-gray-500 dark:text-gray-400">
      @config('footer')
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
