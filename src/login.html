<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@config('login.meta.title')</title>
  <meta name="description" content="@config('login.meta.description')">
  <link rel="stylesheet" href="css/style.css">
</head>

<body
  class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
  <div class="bg-mesh"></div>

  <button
    class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
    title="Toggle Theme" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path
        d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
    </svg>
  </button>

  <div id="loader" class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
    <div class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin">
    </div>
  </div>
  <form name="sendin" action="$(link-login-only)" method="post" style="display: none">
    <input type="hidden" name="username">
    <input type="hidden" name="password">
    <input type="hidden" name="dst" value="$(link-status)">
    <input type="hidden" name="popup" value="true">
  </form>
  <script src="js/md5.js"></script>
  <script>
    window.useChap = $(if chap-id) true $(else) false $(endif); window.chapId = "$(chap-id)"; window.chapChallenge = "$(chap-challenge)";
  </script>
  @if(config.simple)
      @include('partials/login/simple.html')
  @else
      @include('partials/login/with_credential.html')
  @endif
  <script>
    // View Management (Portal vs Form)
    const initialView = document.getElementById('initial-view');
    const formView = document.getElementById('form-view');
    const btnAuthenticate = document.getElementById('btn-authenticate');
    const btnBack = document.getElementById('btn-back');

    const showLoginView = () => {
      if (initialView && formView) {
        initialView.classList.add('opacity-0', '-translate-x-10');
        setTimeout(() => {
          initialView.classList.add('hidden');
          formView.classList.remove('hidden');
          setTimeout(() => {
            formView.classList.remove('opacity-0', 'scale-95');
          }, 50);
        }, 300);
      }
    };

    const hideLoginView = () => {
      if (initialView && formView) {
        formView.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
          formView.classList.add('hidden');
          initialView.classList.remove('hidden');
          setTimeout(() => {
            initialView.classList.remove('opacity-0', '-translate-x-10');
          }, 50);
        }, 300);
      }
    };

    if (btnAuthenticate) btnAuthenticate.addEventListener('click', showLoginView);
    if (btnBack) btnBack.addEventListener('click', hideLoginView);

    // Tab Management (Member vs Voucher)
    const tabBtns = document.querySelectorAll('.tab-btn');
    const passwordGroup = document.getElementById('password-group');
    const usernameLabel = document.getElementById('username-label');
    const usernameInput = document.querySelector(
      'input[name="username"].input-field'
    );

    if (tabBtns.length > 0) {
      tabBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          tabBtns.forEach((b) => {
            b.classList.remove('active');
            b.setAttribute('data-active', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('data-active', 'true');

          const type = btn.getAttribute('data-type');
          if (type === 'member') {
            if (passwordGroup) passwordGroup.style.display = 'block';
            if (usernameLabel) usernameLabel.textContent = 'Username';
            if (usernameInput) usernameInput.placeholder = 'Enter Username';
          } else {
            if (passwordGroup) {
              passwordGroup.style.display = 'none';
              passwordGroup.querySelector('input').value = '';
            }
            if (usernameLabel) usernameLabel.textContent = 'Voucher Code';
            if (usernameInput) usernameInput.placeholder = 'Enter Voucher Code';
          }
        });
      });
    }

    // Price List Toggle
    const priceBtn = document.getElementById('price-btn');
    const priceList = document.getElementById('price-list');

    if (priceBtn && priceList) {
      priceBtn.addEventListener('click', () => {
        priceList.classList.toggle('hidden');
        // Add subtle animation or scroll if needed
        if (!priceList.classList.contains('hidden')) {
          priceList.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
    }
  </script>
  <script src="js/app.js"></script>
</body>

</html>
