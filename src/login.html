<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arnet-ID | Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body
    class="bg-slate-50 text-slate-500 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
    <div class="bg-mesh"></div>

    <button
      class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
      title="Toggle Theme">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 fill-current"
        viewBox="0 0 24 24">
        <path
          d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
      </svg>
    </button>

    <div
      id="loader"
      class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
      <div
        class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin"></div>
    </div>

    $(if chap-id)
    <form
      name="sendin"
      action="$(link-login-only)"
      method="post"
      style="display: none">
      <input type="hidden" name="username" />
      <input type="hidden" name="password" />
      <input type="hidden" name="dst" value="$(link-status)" />
      <input type="hidden" name="popup" value="true" />
    </form>
    <script src="md5.js"></script>
    <script>
      function doLogin() {
        const user = document.login.username.value;
        let pass = document.login.password.value;
        // voucher mode
        if (!pass) {
          pass = user;
        }
        document.sendin.username.value = user;
        document.sendin.password.value = hexMD5(
          "$(chap-id)" + pass + "$(chap-challenge)",
        );
        document.sendin.submit();
        return false;
      }
    </script>
    $(endif)

    <div class="glass-card">
      <div id="form-view" class="transition-all duration-500">
        <div id="initial-view" class="transition-all duration-500">
          <div class="text-center mb-10">
            <div class="flex justify-center gap-2">
              <div class="flex items-center">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="64"
                  height="64"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="text-cyan-500 dark:text-neon-blue">
                  <path
                    d="m15.55 8.45 5.138 2.087a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063L8.45 15.551" />
                  <path d="M22 2 2 22" />
                  <path
                    d="m6.816 11.528-2.779-6.84a.495.495 0 0 1 .651-.651l6.84 2.779" />
                </svg>
              </div>
              <div class="flex flex-col">
                <span
                  class="text-center text-cyan-500 dark:text-neon-blue font-semibold text-4xl tracking-widest"
                  >ARNET-ID</span
                >
                <p
                  class="text-xs text-slate-500 dark:text-white/90 mt-1 uppercase tracking-widest">
                  Internet Hotspot Service
                </p>
              </div>
            </div>
          </div>
        </div>

        <div class="flex bg-black/5 dark:bg-white/5 p-1 rounded-xl mb-6">
          <button
            class="tab-btn flex-1 py-2 text-xs h-11 font-bold rounded-lg transition-all data-[active=true]:bg-neon-blue data-[active=true]:text-white dark:data-[active=true]:text-black/70 text-slate-500 dark:text-white/50 uppercase tracking-widest"
            data-type="voucher"
            data-active="true">
            Voucher
          </button>
          <button
            class="tab-btn active flex-1 py-2 text-xs h-11 font-bold rounded-lg transition-all data-[active=true]:bg-neon-blue data-[active=true]:text-white dark:data-[active=true]:text-black/70 text-slate-500 dark:text-white/50 uppercase tracking-widest"
            data-type="member"
            data-active="false">
            Member
          </button>
        </div>

        <form
          name="login"
          action="$(link-login-only)"
          method="post"
          $(if
          chap-id)
          onSubmit="return doLogin()"
          $(endif)
          class="space-y-5">
          <input type="hidden" name="dst" value="$(link-status)" />
          <input type="hidden" name="popup" value="true" />

          $(if error)
          <div
            class="bg-red-500/10 border-l-4 border-red-500 p-4 rounded-lg text-red-500 text-md font-semibold animate-[shake_0.5s_ease] mb-6 flex items-center gap-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            $(error)
          </div>
          $(endif)

          <div class="input-group">
            <label class="input-label" id="username-label">Voucher Code</label>
            <div class="input-field-container">
              <span class="input-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input
                name="username"
                type="text"
                value="$(username)"
                placeholder="Enter Voucher Code"
                required
                class="input-field" />
            </div>
          </div>

          <div class="input-group hidden" id="password-group">
            <label class="input-label">Password</label>
            <div class="input-field-container">
              <span class="input-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input
                name="password"
                type="password"
                placeholder="Enter Password"
                class="input-field" />
            </div>
          </div>

          <button
            type="submit"
            class="neon-btn group uppercase tracking-widest text-md italic">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 transition-transform group-hover:translate-x-1"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
            Login
          </button>
        </form>
        <div class="space-y-4">
          $(if trial == 'yes')
          <button
            class="neon-btn group uppercase tracking-widest text-md italic"
            onclick="window.location.href = 'trials.html'">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-yellow-500 fill-yellow-500 group-hover:animate-pulse"
              viewBox="0 0 24 24">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            Gratisan
          </button>
          $(endif)

          <button
            class="w-full py-4 bg-white/5 border border-black/5 dark:border-white/10 rounded-xl text-xs font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3 group uppercase tracking-widest italic"
            onclick="window.location.href = 'https://laksa19.github.io/myqr'">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-neon-purple"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
              <line x1="17" y1="7" x2="17.01" y2="7" />
              <line x1="17" y1="17" x2="17.01" y2="17" />
              <line x1="7" y1="17" x2="7.01" y2="17" />
            </svg>
            Scan Voucher
          </button>

          <button
            id="price-btn"
            class="w-full py-4 bg-white/5 border border-black/5 dark:border-white/10 rounded-xl text-xs font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3 group uppercase tracking-widest italic">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-neon-blue"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            Daftar Harga
          </button>
          <div
            id="price-list"
            class="hidden bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/10 rounded-xl p-4 animate-fadeIn">
            <div class="flex flex-col gap-3">
              <div
                class="flex justify-between items-center text-sm uppercase tracking-widest font-bold">
                <span class="text-slate-500 dark:text-white/50">8 Jam</span>
                <span class="text-neon-blue">Rp. 1.000</span>
              </div>
              <div
                class="flex justify-between items-center text-sm uppercase tracking-widest font-bold">
                <span class="text-slate-500 dark:text-white/50">1 Hari</span>
                <span class="text-neon-blue">Rp. 5.000</span>
              </div>
              <div
                class="flex justify-between items-center text-sm uppercase tracking-widest font-bold">
                <span class="text-slate-500 dark:text-white/50">1 Bulan</span>
                <span class="text-neon-blue">Rp. 60.000</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
        Powered by Zen — v2.0.0
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
