<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@config('trials.meta.title')</title>
    <meta name="description" content="@config('trials.meta.description')">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-stone-50 text-zinc-900 dark:bg-zinc-900 dark:text-stone-100 font-space min-h-screen flex items-center justify-center overflow-x-hidden p-4">

    <!-- Theme Toggle -->
    <button type="button"
        class="theme-toggle fixed top-4 right-4 w-10 h-10 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 flex items-center justify-center bg-stone-50 dark:bg-zinc-900 z-50 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors"
        title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
        </svg>
    </button>

    <div class="border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 p-6 md:p-8 w-full max-w-md mx-auto animate-fade-in-up">
        <div class="text-center mb-6">
            <span class="text-xs uppercase tracking-[0.3em] text-gray-500 dark:text-gray-400 font-bold">Sponsored Access</span>
            <h1 class="text-xl font-space tracking-widest text-zinc-900 dark:text-stone-100 uppercase mt-2">
                @config(trials.title)</h1>
            <p class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mt-1">@config(trials.description)</p>
        </div>

        <div class="border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 my-6 aspect-video flex items-center justify-center overflow-hidden">
            <div class="text-center p-8 overflow-y-auto">
                <p class="text-sm md:text-base uppercase text-gray-500 dark:text-gray-400 font-bold font-space">
                    @config(trials.message)
                </p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between text-xs uppercase tracking-wider font-bold">
                <span class="text-gray-500 dark:text-gray-400">Network Status</span>
                <span id="countdown" class="text-zinc-900 dark:text-stone-100">10s remaining</span>
            </div>
            <div class="w-full h-1 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700">
                <div id="progress-bar" class="h-full bg-zinc-900 dark:bg-stone-50" style="width: 0%; transition: width 1s linear;"></div>
            </div>
        </div>

        <button id="skip-btn" type="button"
            class="w-full px-6 py-4 rounded-xl border-2 border-stone-50 dark:border-zinc-900 shadow-brutal dark:shadow-brutal-dark bg-zinc-900 text-stone-50 dark:bg-stone-50 dark:text-zinc-900 text-sm uppercase tracking-widest hover:bg-zinc-800 dark:hover:bg-stone-200 transition-all active:translate-y-1 active:shadow-none flex items-center justify-center gap-2 mt-6 opacity-50 cursor-not-allowed"
            disabled>
            @config(trials.button)
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
            </svg>
        </button>

        <p class="text-center mt-6 text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">
            @config(trials.footer)
        </p>
        <div class="text-center mt-10 text-xs uppercase tracking-[0.3em] text-gray-500 dark:text-gray-400">
            @config('footer')
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const DURATION = 10;
            let timeLeft = DURATION;
            const skipBtn = document.getElementById('skip-btn');
            const countdownEl = document.getElementById('countdown');
            const progressBar = document.getElementById('progress-bar');

            progressBar.style.width = '0%';

            const timer = setInterval(() => {
                timeLeft--;
                const progress = ((DURATION - timeLeft) / DURATION) * 100;
                progressBar.style.width = progress + '%';

                if (timeLeft > 0) {
                    countdownEl.textContent = timeLeft + 's remaining';
                } else {
                    clearInterval(timer);
                    countdownEl.textContent = 'Ready!';
                    skipBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    skipBtn.style.cursor = 'pointer';
                    skipBtn.disabled = false;

                    setTimeout(proceed, 2000);
                }
            }, 1000);

            function proceed() {
                window.location.href = "$(link-login-only)?username=T-$(mac-esc)&dst=$(link-orig-esc)";
            }

            skipBtn.addEventListener('click', proceed);
        });
    </script>
</body>

</html>
