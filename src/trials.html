<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@config('trials.meta.title')</title>
    <meta name="description" content="@config('trials.meta.description')">
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
    <div class="bg-mesh"></div>

    <button type="button"
        class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
        title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path
                d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
        </svg>
    </button>

    <div class="glass-card">
        <div class="text-center mb-6">
            <span class="text-[10px] uppercase tracking-[0.3em] text-neon-purple font-bold">Sponsored Access</span>
            <h1 class="text-3xl font-semibold tracking-widest text-cyan-500 dark:text-neon-blue bg-clip-text uppercase">
                @config(trials.title)</h1>
            <p class="text-xs text-slate-500 dark:text-white/70 mt-2">@config(trials.description)</p>
        </div>

        <div
            class="ad-container relative bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/10 rounded-2xl overflow-hidden my-6 aspect-video flex items-center justify-center backdrop-blur-sm">
            <!-- Placeholder for actual Ad content (Image/Video) -->
            <div class="text-center p-8 overflow-y-auto">
                <!-- <div class="w-16 h-16 bg-neon-blue/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-neon-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                </div>
                <p class="text-sm font-bold tracking-widest uppercase">Content Loading...</p>
                <p class="text-[9px] text-slate-400 dark:text-white/30 mt-2 uppercase">Your content will appear here</p> -->
                <p
                    class="text-sm md:text-md lg:text-lg xl:text-xl uppercase text-gray-500 dark:text-cyan-500 font-semibold font-mono">
                    @config(trials.message)
                </p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between text-[10px] uppercase tracking-widest font-bold">
                <span class="text-slate-400 dark:text-white/30">Network Status</span>
                <span id="countdown" style="color: #00d2ff;">10s remaining</span>
            </div>
            <div class="w-full rounded-full overflow-hidden" style="height: 6px; background: rgba(0,0,0,0.1);">
                <div id="progress-bar" class="h-full rounded-full"
                    style="width: 0%; background: linear-gradient(90deg, #00d2ff, #9d50bb); transition: width 1s linear;">
                </div>
            </div>
        </div>

        <button id="skip-btn" type="button"
            class="neon-btn group uppercase tracking-widest text-[10px] font-black italic mt-8 opacity-50 cursor-not-allowed"
            disabled>
            @config(trials.button)
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:translate-x-1"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
            </svg>
        </button>

        <p class="text-center mt-6 text-[9px] uppercase tracking-widest text-slate-400 dark:text-white/50">
            @config(trials.message)
        </p>
        <div class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
            @config('footer')
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const DURATION = 10; // Configurable duration in seconds
            let timeLeft = DURATION;
            const skipBtn = document.getElementById('skip-btn');
            const countdownEl = document.getElementById('countdown');
            const progressBar = document.getElementById('progress-bar');

            // Set initial state
            progressBar.style.width = '0%';

            const timer = setInterval(() => {
                timeLeft--;
                const progress = ((DURATION - timeLeft) / DURATION) * 100;
                progressBar.style.width = progress + '%';

                if (timeLeft > 0) {
                    countdownEl.textContent = timeLeft + 's remaining';
                } else {
                    clearInterval(timer);
                    countdownEl.textContent = 'Ready!';
                    skipBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    skipBtn.classList.add('hover:scale-[1.02]', 'active:scale-100');
                    skipBtn.style.cursor = 'pointer';
                    skipBtn.disabled = false;

                    // Auto redirect after a small delay
                    setTimeout(proceed, 2000);
                }
            }, 1000);

            function proceed() {
                window.location.href = "$(link-login-only)?username=T-$(mac-esc)&dst=$(link-orig-esc)";
            }

            skipBtn.addEventListener('click', proceed);
        });
    </script>
</body>

</html>
