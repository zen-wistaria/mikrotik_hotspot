<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <title>@config('logout.meta.title')</title>
  <meta name="description" content="@config('logout.meta.description')">
  <link rel="stylesheet" href="css/style.css" />
  <script>
    function openLogin() {
      if (window.name != "hotspot_logout") return true;
      open("$(link-login)", "_blank", "");
      window.close();
      return false;
    }
  </script>
</head>

<body class="bg-white text-black dark:bg-black dark:text-white font-orbitron min-h-screen flex items-center justify-center overflow-x-hidden p-4">

  <!-- Theme Toggle -->
  <button
    class="theme-toggle fixed top-4 right-4 w-10 h-10 border border-black dark:border-white flex items-center justify-center bg-white dark:bg-black z-50 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-colors"
    title="Toggle Theme" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
    </svg>
  </button>

  <!-- Loader -->
  <div id="loader" class="fixed inset-0 bg-white dark:bg-black z-50 hidden items-center justify-center">
    <div class="w-10 h-10 border border-black dark:border-white animate-spin"></div>
  </div>

  <div class="border border-black dark:border-white bg-white dark:bg-black p-6 md:p-8 w-full max-w-md mx-auto animate-fade-in-up">
    <div class="text-center mb-6">
      <div class="w-16 h-16 border border-black dark:border-white flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-black dark:text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <h1 class="text-xl font-orbitron tracking-widest text-black dark:text-white uppercase">
        @config(logout.title)
      </h1>
      <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mt-1 space-y-1">
        <span>@config(logout.description)</span>
        <span class="text-black dark:text-white font-bold block">$(username)</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
      <div class="border border-black dark:border-white p-4">
        <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1">User</div>
        <div class="text-sm font-bold text-black dark:text-white">$(username)</div>
      </div>
      <div class="border border-black dark:border-white p-4">
        <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1">Uptime</div>
        <div class="text-sm font-bold text-black dark:text-white">$(uptime)</div>
      </div>
      $(if session-time-left)
      <div class="border border-black dark:border-white p-4 col-span-2">
        <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1 text-center">Time Left</div>
        <div class="text-sm font-bold text-black dark:text-white text-center">$(session-time-left)</div>
      </div>
      $(endif)
      <div class="border border-black dark:border-white p-4 col-span-2">
        <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1 text-center">Data Consumed (Up/Down)</div>
        <div class="text-sm font-bold text-black dark:text-white text-center">$(bytes-in-nice) / $(bytes-out-nice)</div>
      </div>
    </div>

    <form action="$(link-login)" name="login" onSubmit="return openLogin()">
      <button class="w-full px-6 py-4 bg-black text-white dark:bg-white dark:text-black text-sm uppercase tracking-widest hover:bg-gray-900 dark:hover:bg-gray-200 transition-colors flex items-center justify-center gap-2" type="submit">
        @config(logout.button)
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          <path d="M22 2 11 13" />
          <path d="M22 10V2h-8" />
        </svg>
      </button>
    </form>

    <div class="text-center mt-6 text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">
      @config(logout.footer)
    </div>
    <div class="text-center mt-10 text-xs uppercase tracking-[0.3em] text-gray-500 dark:text-gray-400">
      @config('footer')
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
