<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <title>@config('logout.meta.title')</title>
  <meta name="description" content="@config('logout.meta.description')">
  <link rel="stylesheet" href="css/style.css" />
  <script>
    function openLogin() {
      if (window.name != "hotspot_logout") return true;
      open("$(link-login)", "_blank", "");
      window.close();
      return false;
    }
  </script>
</head>

<body
  class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
  <div class="bg-mesh"></div>

  <button
    class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
    title="Toggle Theme" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path
        d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
    </svg>
  </button>

  <div id="loader" class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
    <div class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin">
    </div>
  </div>

  <div class="glass-card">
    <div class="text-center mb-8">
      <div
        class="w-16 h-16 bg-neon-purple/10 border border-neon-purple/20 rounded-2xl flex items-center justify-center mx-auto mb-4 animate-float">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-neon-purple" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <h1 class="text-3xl font-semibold tracking-widest text-cyan-500 dark:text-neon-blue bg-clip-text uppercase">
        @config(logout.title)
      </h1>
      <div
        class="text-[10px] text-slate-400 dark:text-white/70 mt-1 uppercase tracking-widest leading-relaxed flex gap-2 items-center justify-center flex-col">
        <span>@config(logout.description)</span>
        <span class="text-slate-900 dark:text-white font-bold text-sm">$(username)</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
      <div class="stat-card">
        <div class="stat-label">User</div>
        <div class="stat-value">$(username)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value">$(uptime)</div>
      </div>
      $(if session-time-left)
      <div class="stat-card col-span-2">
        <div class="stat-label text-center">Time Left</div>
        <div class="stat-value text-center tracking-tight">
          $(session-time-left)
        </div>
      </div>
      $(endif)
      <div class="stat-card col-span-2">
        <div class="stat-label text-center">Data Consumed (Up/Down)</div>
        <div class="stat-value text-center tracking-tight">
          $(bytes-in-nice) / $(bytes-out-nice)
        </div>
      </div>
    </div>

    <form action="$(link-login)" name="login" onSubmit="return openLogin()">
      <button class="neon-btn group uppercase tracking-widest text-sm italic" type="submit">
        @config(logout.button)
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:-rotate-45"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          <path d="M22 2 11 13" />
          <path d="M22 10V2h-8" />
        </svg>
      </button>
    </form>

    <div class="text-center mt-8 text-[10px] text-slate-400 dark:text-white/50 uppercase tracking-[0.2em]">
      @config(logout.footer)
    </div>
    <div class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
      @config('footer')
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
