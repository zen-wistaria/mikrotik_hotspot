<div class="glass-card">
  <!-- Initial Portal View -->
  <div id="initial-view" class="transition-all duration-500">
    @include('../logo.html')

    <div class="space-y-4">
      <div id="form-view" class="transition-all duration-500">
        <div class="flex bg-black/5 dark:bg-white/5 p-1 rounded-xl mb-6">
          <button
            class="tab-btn flex-1 py-2 text-xs h-11 font-bold rounded-lg transition-all data-[active=true]:bg-neon-blue data-[active=true]:text-white dark:data-[active=true]:text-black/70 text-slate-500 dark:text-white/50 uppercase tracking-widest"
            data-type="voucher" data-active="true" type="button">
            Voucher
          </button>
          <button
            class="tab-btn active flex-1 py-2 text-xs h-11 font-bold rounded-lg transition-all data-[active=true]:bg-neon-blue data-[active=true]:text-white dark:data-[active=true]:text-black/70 text-slate-500 dark:text-white/50 uppercase tracking-widest"
            data-type="member" data-active="false" type="button">
            Member
          </button>
        </div>

        <form name="login" action="$(link-login-only)" method="post" class="space-y-5">
          <input type="hidden" name="dst" value="$(link-status)">
          <input type="hidden" name="popup" value="true">
          $(if error)
          <div
            class="bg-red-500/10 border-l-4 border-red-500 p-4 rounded-lg text-red-500 animate-[shake_0.5s_ease] mb-6 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span class="text-md text-red-500 font-mono font-semibold">
              $(error)
            </span>
          </div>
          $(endif)

          <div class="input-group">
            <label class="input-label" id="username-label">Voucher Code</label>
            <div class="input-field-container">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input name="username" type="text" value="$(username)" placeholder="Enter Voucher Code" required
                class="input-field">
            </div>
          </div>

          <div class="input-group hidden" id="password-group">
            <label class="input-label">Password</label>
            <div class="input-field-container">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input name="password" type="password" placeholder="Enter Password" class="input-field">
            </div>
          </div>

          <button type="button" onclick="doLogin()" class="neon-btn group uppercase tracking-widest text-xs italic">
            @config(login.buttonConnect)
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:translate-x-1"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>
      <button
        class="w-full py-4 bg-white/5 border border-black/5 dark:border-white/10 rounded-xl text-xs font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3 group uppercase tracking-widest italic"
        onclick="window.location.href='https://laksa19.github.io/myqr'" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-neon-purple" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <line x1="7" y1="7" x2="7.01" y2="7" />
          <line x1="17" y1="7" x2="17.01" y2="7" />
          <line x1="17" y1="17" x2="17.01" y2="17" />
          <line x1="7" y1="17" x2="7.01" y2="17" />
        </svg>
        @config(login.buttonScan)
      </button>
      $(if trial == 'yes')
      <button class="neon-btn group uppercase tracking-widest text-xs italic"
        onclick="window.location.href = 'trials.html'" type="button">
        <svg xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 text-yellow-500 fill-yellow-500 group-hover:animate-pulse" viewBox="0 0 24 24">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
        @config(login.buttonTrial)
      </button>
      $(endif)
      @if(config.price_list)
      @include('../price.html')
      @endif
    </div>
  </div>

  <!-- Identity Form View (Hidden by default) -->

  <div class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
    @config('footer')
  </div>
</div>
