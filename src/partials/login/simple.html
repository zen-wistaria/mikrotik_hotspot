<div class="border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 p-6 md:p-8 w-full max-w-md mx-auto">
  <!-- Initial Portal View -->
  <div id="initial-view" class="transition-all duration-500">
    @include('../logo.html')

    <div class="space-y-4">
      <div id="form-view" class="transition-all duration-500">
        <div class="flex p-1 bg-transparent border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 mb-6">
          <button
            class="tab-btn flex-1 py-2.5 rounded-lg text-xs uppercase tracking-widest transition-colors data-[active=true]:bg-zinc-900 data-[active=true]:text-stone-50 dark:data-[active=true]:bg-stone-50 dark:data-[active=true]:text-zinc-900 text-gray-500 dark:text-gray-400"
            data-type="voucher" data-active="true" type="button">
            Voucher
          </button>
          <button
            class="tab-btn flex-1 py-2.5 rounded-lg text-xs uppercase tracking-widest transition-colors data-[active=true]:bg-zinc-900 data-[active=true]:text-stone-50 dark:data-[active=true]:bg-stone-50 dark:data-[active=true]:text-zinc-900 text-gray-500 dark:text-gray-400"
            data-type="member" data-active="false" type="button">
            Member
          </button>
        </div>

        <form name="login" action="$(link-login-only)" method="post" class="space-y-6">
          <input type="hidden" name="dst" value="$(link-status)">
          <input type="hidden" name="popup" value="true">
          $(if error)
          <div class="border-2 rounded-xl shadow-brutal-red dark:shadow-brutal-red border-red-500 p-4 text-red-600 dark:text-red-400 text-xs uppercase tracking-wider flex items-center gap-3 animate-fade-in-up">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span>$(error)</span>
          </div>
          $(endif)

          <div class="space-y-1">
            <label class="block text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400" id="username-label">Voucher Code</label>
            <div class="relative">
              <span class="absolute left-0 top-1/2 -translate-y-1/2 text-zinc-900 dark:text-stone-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input name="username" type="text" value="$(username)" placeholder="ENTER VOUCHER CODE" required class="w-full bg-transparent border-b-2 border-zinc-900 dark:border-zinc-700 py-3 pl-7 text-zinc-900 dark:text-stone-100 placeholder-gray-400 focus:outline-none text-sm tracking-wider">
            </div>
          </div>

          <div class="hidden space-y-1" id="password-group">
            <label class="block text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">Password</label>
            <div class="relative">
              <span class="absolute left-0 top-1/2 -translate-y-1/2 text-zinc-900 dark:text-stone-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input name="password" type="password" placeholder="ENTER PASSWORD" class="w-full bg-transparent border-b-2 border-zinc-900 dark:border-zinc-700 py-3 pl-7 pr-8 text-zinc-900 dark:text-stone-100 placeholder-gray-400 focus:outline-none text-sm tracking-wider">
              <button type="button" class="password-toggle" tabindex="-1" aria-label="Toggle password visibility">
                <svg class="w-4 h-4 eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="w-4 h-4 eye-closed hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                  <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="button" onclick="doLogin()" class="w-full px-6 py-4 rounded-xl border-2 border-stone-50 dark:border-zinc-900 shadow-brutal dark:shadow-brutal-dark bg-zinc-900 text-stone-50 dark:bg-stone-50 dark:text-zinc-900 text-sm uppercase tracking-widest hover:bg-zinc-800 dark:hover:bg-stone-200 transition-all active:translate-y-1 active:shadow-none flex items-center justify-center gap-2">
            @config(login.buttonConnect)
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>

      <button
        class="flex items-center justify-center w-full gap-3 px-6 py-4 text-sm uppercase tracking-widest transition-colors border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 text-zinc-900 dark:text-stone-100 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900"
        onclick="window.location.href='https://zen-wistaria.github.io/mikrotik-hotspot-qrscanner/'" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-current" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        @config(login.buttonScan)
      </button>
      $(if trial == 'yes')
      <button class="w-full px-6 py-4 rounded-xl border-2 border-stone-50 dark:border-zinc-900 shadow-brutal dark:shadow-brutal-dark bg-zinc-900 text-stone-50 dark:bg-stone-50 dark:text-zinc-900 text-sm uppercase tracking-widest hover:bg-zinc-800 dark:hover:bg-stone-200 transition-all active:translate-y-1 active:shadow-none flex items-center justify-center gap-2"
        onclick="window.location.href = 'trials.html'" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
        @config(login.buttonTrial)
      </button>
      $(endif)
      @if(config.price)
        @include('../price.html')
      @endif
    </div>
  </div>

  <div class="text-center mt-10 text-xs uppercase tracking-[0.3em] text-gray-500 dark:text-gray-400">
    @config('footer')
  </div>
</div>
