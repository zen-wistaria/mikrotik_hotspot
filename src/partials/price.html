<button id="price-btn" type="button"
  class="w-full py-4 bg-white/5 border border-black/5 dark:border-white/10 rounded-xl text-xs font-bold hover:bg-black/5 dark:hover:bg-white/10 transition-all flex items-center justify-center gap-3 group uppercase tracking-widest italic">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-neon-blue" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
  </svg>
  @config(login.buttonPrice)
</button>
<div id="price-list"
  class="hidden bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/10 rounded-xl p-4 animate-fadeIn">
  <div class="flex flex-col gap-3">
    <div class="flex justify-between items-center text-xs uppercase tracking-widest font-bold">
      <span class="text-slate-500 dark:text-white/50">8 Hours</span>
      <span class="text-neon-blue">Rp. 1.000</span>
    </div>
    <div class="flex justify-between items-center text-xs uppercase tracking-widest font-bold">
      <span class="text-slate-500 dark:text-white/50">1 Day</span>
      <span class="text-neon-blue">Rp. 5.000</span>
    </div>
    <div class="flex justify-between items-center text-xs uppercase tracking-widest font-bold">
      <span class="text-slate-500 dark:text-white/50">1 Month</span>
      <span class="text-neon-blue">Rp. 60.000</span>
    </div>
  </div>
</div>
