<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@config('error.meta.title')</title>
    <meta name="description" content="@config('error.meta.description')">
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body
    class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
    <div class="bg-mesh"></div>

    <button
      class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
      title="Toggle Theme">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 fill-current"
        viewBox="0 0 24 24">
        <path
          d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
      </svg>
    </button>

    <div
      id="loader"
      class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
      <div
        class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin"></div>
    </div>

    <div class="glass-card">
      <div
        class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-full flex items-center justify-center mx-auto mb-8 animate-[pulse_2s_infinite]">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-10 h-10 text-red-500"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path
            d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        </svg>
      </div>

      <div class="text-center mb-6">
        <h1
          class="text-3xl font-semibold tracking-widest text-red-500 bg-clip-text uppercase">
          System Error
        </h1>
        <p
          class="text-[10px] text-slate-400 dark:text-white/70 mt-1 uppercase tracking-widest leading-relaxed">
          The authentication protocol has encountered an anomaly.
        </p>
      </div>

      <div
        class="bg-red-500/5 border border-red-500/10 p-4 rounded-xl text-xs text-red-600 dark:text-red-400/80 mb-6 leading-relaxed">
        <div
          class="uppercase tracking-widest text-[9px] mb-1 font-bold text-red-500">
          Error Details
        </div>
        $(error)
      </div>

      <div
        class="text-[11px] text-slate-500 dark:text-white/70 mb-8 space-y-2 list-none p-0">
        <div class="flex items-center gap-2">
          <div class="w-1 h-1 bg-red-500 rounded-full"></div>
          Invalid credentials provided
        </div>
        <div class="flex items-center gap-2">
          <div class="w-1 h-1 bg-red-500 rounded-full"></div>
          Session limit reached
        </div>
        <div class="flex items-center gap-2">
          <div class="w-1 h-1 bg-red-500 rounded-full"></div>
          Network communication failure
        </div>
      </div>

      <button
        class="neon-btn group bg-none bg-red-500 hover:shadow-[0_0_25px_rgba(239,68,68,0.4)] uppercase tracking-widest text-sm italic"
        onclick="window.location.href = '$(link-login)'">
        Go to Login Page
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 transition-transform group-hover:rotate-180"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>

      <div
        class="text-center mt-8 text-[9px] text-slate-400 dark:text-white/50 uppercase tracking-[0.2em]">
        Error Glyph: <span class="text-red-500/50">$(error)</span>
      </div>
      <div
        class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
        @config('footer')
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
