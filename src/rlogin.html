$(if http-status == 302)Hotspot login required$(endif)
$(if http-header == "Location")$(link-redirect)$(endif)
<!doctype html>
<html lang="en">
<!--
  <?xml version="1.0" encoding="UTF-8"?>
    <WISPAccessGatewayParam
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:noNamespaceSchemaLocation="http://$(hostname)/xml/WISPAccessGatewayParam.xsd">
      <Redirect>
    <AccessProcedure>1.0</AccessProcedure>
    <AccessLocation>$(location-id)</AccessLocation>
    <LocationName>$(location-name)</LocationName>
    <LoginURL>$(link-login-only)?target=xml</LoginURL>
    <MessageType>100</MessageType>
    <ResponseCode>0</ResponseCode>
      </Redirect>
    </WISPAccessGatewayParam>
  -->

<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="2; url=$(link-redirect)" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@config('rlogin.meta.title')</title>
  <meta name="description" content="@config('rlogin.meta.description')">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body
  class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all w-full">
  <div class="bg-mesh"></div>

  <!-- Theme Toggle -->
  <button
    class="theme-toggle fixed top-5 right-5 w-11 h-11 rounded-full bg-black/5 border border-black/5 dark:bg-white/5 dark:border-white/10 flex items-center justify-center cursor-pointer backdrop-blur-md z-50 transition-all hover:rotate-12 hover:bg-black/10 dark:hover:bg-white/10"
    title="Toggle Theme">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
      <path
        d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
    </svg>
  </button>

  <!-- Loader -->
  <div id="loader" class="fixed inset-0 bg-slate-50 dark:bg-dark-primary z-1000 hidden items-center justify-center">
    <div class="w-12 h-12 border-4 border-black/10 dark:border-white/10 border-t-neon-blue rounded-full animate-spin">
    </div>
  </div>

  <div class="glass-card">
    <div class="text-center mb-10">
      <div
        class="w-16 h-16 bg-neon-blue/10 border border-neon-blue/20 rounded-2xl flex items-center justify-center mx-auto mb-4 animate-float">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-neon-blue" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
      </div>
      <h1 class="text-3xl font-semibold tracking-widest text-cyan-500 dark:text-neon-blue bg-clip-text uppercase">
        @config('rlogin.title')
      </h1>
      <p class="text-[10px] text-slate-400 dark:text-white/70 mt-1 uppercase tracking-widest leading-relaxed">
        @config('rlogin.description')
      </p>
    </div>

    <div class="flex justify-center mb-8">
      <div class="w-12 h-12 border-4 border-black/5 dark:border-white/10 border-t-neon-blue rounded-full animate-spin">
      </div>
    </div>

    <div
      class="bg-black/5 dark:bg-white/5 p-4 rounded-xl text-xs font-mono font-semibold text-slate-500 dark:text-white/60 mb-8 text-center leading-relaxed italic">
      If you are not redirected automatically, please
      <a href="$(link-redirect)" class="text-cyan-500 dark:text-neon-blue font-bold hover:underline">click here</a>.
    </div>

    <div class="text-center mt-12 text-[9px] uppercase tracking-[0.3em] text-slate-400 dark:text-white/70">
      @config('footer')
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
