<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <title>@config(qrcode.meta.title)</title>
    <meta name="description" content="@config(qrcode.meta.description)">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/qrcode.js"></script>
  </head>

  <body
    class="bg-gradient-to-br from-[#0B1120] to-[#0F172A] min-h-screen font-['Segoe_UI','Poppins','Inter',system-ui] flex justify-center items-center p-5"
  >
    <div
      class="max-w-[650px] w-full mx-auto bg-[rgba(15,23,42,0.55)] backdrop-blur-xl rounded-3xl p-6 pb-8 shadow-2xl shadow-black/30 border border-white/5"
    >
      <!-- Header -->
      <div class="mb-5 text-center">
        <h1
          class="text-[1.8rem] font-extrabold bg-gradient-to-r from-[#E0E7FF] to-[#67E8F9] bg-clip-text text-transparent inline-flex items-center gap-2.5"
        >
          @config(qrcode.title)
        </h1>
        <div class="mt-2 text-sm text-slate-400">
          @config(qrcode.description)
        </div>
      </div>

      <!-- Camera Stage -->
      <div
        class="camera-stage relative bg-black rounded-xl overflow-hidden my-4 shadow-2xl shadow-black/50 border border-white/15 aspect-[4/3]"
      >
        <div id="reader" class="w-full h-full bg-black"></div>

        <!-- Preview Stage -->
        <div
          id="previewStage"
          class="absolute top-0 left-0 z-10 items-center justify-center hidden w-full h-full bg-black preview-stage"
        >
          <button
            type="button"
            id="closePreviewBtn"
            class="absolute top-2.5 right-2.5 bg-black/70 border-none text-white w-8 h-8 rounded-xl cursor-pointer text-lg flex items-center justify-center z-20 hover:bg-red-700 transition-colors"
          >
            ✕
          </button>
          <img
            id="previewImg"
            alt="Preview QR"
            class="object-contain max-w-full max-h-full"
          >
        </div>

        <!-- Scan Overlay -->
        <div
          class="absolute top-0 left-0 z-20 w-full h-full pointer-events-none scan-overlay rounded-xl"
        >
          <div
            class="absolute top-[15px] left-[15px] right-[15px] bottom-[15px] border-2 border-[rgba(56,189,248,0.6)] rounded-xl shadow-[0_0_0_2px_rgba(0,0,0,0.3),0_0_20px_rgba(56,189,248,0.3)] animate-scan-pulse"
          ></div>
          <div
            class="absolute top-1/2 left-5 right-5 h-1 bg-gradient-to-r from-transparent via-[#38BDF8] to-transparent -translate-y-1/2 animate-scan-line opacity-70"
          ></div>
        </div>
      </div>

      <!-- Button Group -->
      <div class="flex flex-wrap justify-center gap-3 my-5">
        <button
          type="button"
          id="switchCamBtn"
          class="px-5 py-2.5 rounded-full font-semibold text-sm bg-slate-800/90 backdrop-blur text-slate-100 border border-slate-700 shadow-md hover:bg-blue-800 hover:-translate-y-0.5 transition-all flex items-center gap-2"
        >
          @config(qrcode.button.switchCam)
        </button>
        <button
          type="button"
          id="stopCamBtn"
          class="px-5 py-2.5 rounded-full font-semibold text-sm bg-slate-800/90 backdrop-blur text-slate-100 border border-slate-700 shadow-md hover:bg-blue-800 hover:-translate-y-0.5 transition-all flex items-center gap-2"
        >
          @config(qrcode.button.stopCam)
        </button>
        <button
          type="button"
          id="startCamBtn"
          class="px-5 py-2.5 rounded-full font-semibold text-sm bg-slate-800/90 backdrop-blur text-slate-100 border border-slate-700 shadow-md hover:bg-blue-800 hover:-translate-y-0.5 transition-all flex items-center gap-2"
        >
          @config(qrcode.button.startCam)
        </button>
      </div>

      <!-- Upload Area -->
      <div>
        <label
          id="dropZone"
          for="fileInput"
          class="flex flex-col items-center justify-center gap-2 p-4 transition border-2 border-dashed cursor-pointer border-slate-600 rounded-2xl hover:border-blue-400 hover:bg-slate-800/40"
        >
          <span class="text-2xl">📂</span>
          <span class="text-sm text-slate-300"
            >@config(qrcode.text.scanFromFile)</span
          >
        </label>

        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- Notification -->
      <div
        id="notifContainer"
        class="z-40 flex flex-col items-center w-full gap-3 px-4 py-3 mt-4 text-sm font-medium border-l-4 rounded-full backdrop-blur-md animate-slide-in"
      ></div>

      <!-- Result Card -->
      <!-- <div id="resultCard" class="hidden p-4 mt-4 border bg-black/50 rounded-2xl border-white/10 backdrop-blur-md">
      <div class="text-xs uppercase tracking-wide text-slate-400 mb-2 flex items-center gap-1.5">
        <span>Result Scan</span>
      </div>
      <div id="resultText" class="font-mono text-sm leading-relaxed break-all text-slate-200"></div>
      <div id="redirectContainer" class="flex flex-wrap justify-end gap-2 mt-3"></div>
    </div> -->

      <footer class="mt-6 text-xs text-center text-slate-600">
        @config(qrcode.footer)
      </footer>
    </div>

    <script>
    // ======================= KONFIGURASI =======================
    let html5QrCode = null;
    let currentCameraId = null;
    let isScanning = false;
    const devicesList = [];

    // DOM Elements
    const notifContainer = document.querySelector('#notifContainer');
    // const resultCard = document.querySelector("#resultCard");
    // const resultText = document.querySelector("#resultText");
    // const redirectContainer = document.querySelector("#redirectContainer");
    const switchBtn = document.querySelector('#switchCamBtn');
    const stopBtn = document.querySelector('#stopCamBtn');
    const startBtn = document.querySelector('#startCamBtn');
    const fileInput = document.querySelector('#fileInput');
    const previewStage = document.querySelector('#previewStage');
    const previewImg = document.querySelector('#previewImg');
    const closePreviewBtn = document.querySelector('#closePreviewBtn');
    const scanLine = document.querySelector('.animate-scan-line');

    // Helper functions
    function getNotificationStyle(type) {
      const styles = {
        success: 'bg-green-500/20 border-green-500 text-green-100',
        error: 'bg-red-500/20 border-red-500 text-red-100',
        warning: 'bg-amber-500/20 border-amber-500 text-amber-100',
        info: 'bg-blue-500/20 border-blue-500 text-blue-100',
      };

      return `py-3 px-4 w-full rounded-full font-medium flex items-center gap-3 text-sm backdrop-blur-md border-l-4 animate-slide-in ${styles[type] || styles.info}`;
    }

    function showNotification(message, type = 'info') {
      const notif = document.createElement('div');
      notif.className = getNotificationStyle(type);

      const icon =
        type === 'success'
          ? '✅'
          : type === 'error'
            ? '⚠️'
            : type === 'warning'
              ? '⚠️'
              : 'ℹ️';

      notif.innerHTML = `<span>${icon}</span> ${message}`;

      notifContainer.prepend(notif);

      // remove notif
      setTimeout(
        () => {
          notif.classList.add(
            'opacity-0',
            'translate-y-2',
            'transition-all',
            'duration-300'
          );

          setTimeout(() => {
            notif.remove();
          }, 300);
        },
        type === 'error' ? 4000 : 2800
      );

      // remove when click
      notif.addEventListener('click', () => {
        notif.remove();
      });

      // maximum 4 notifs
      const maxNotif = 4;
      if (notifContainer.children.length > maxNotif) {
        notifContainer.firstChild.remsove();
      }
    }

    function isValidUrl(str) {
      if (!str) return false;

      try {
        const url = new URL(str.trim());

        // check have http/https
        if (url.protocol !== 'http:' && url.protocol !== 'https:') {
          return false;
        }

        // decode query (handle encoded)
        const decodedQuery = decodeURIComponent(url.search).toLowerCase();

        // cek parameter username / password
        const hasUser = /(?:\?|&)(username)=/i.test(decodedQuery);
        const hasPass = /(?:\?|&)(password)=/i.test(decodedQuery);

        return hasUser || hasPass;
      } catch (e) {
        return false;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, (m) => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function processScannedQR(qrText) {
      if (!qrText || qrText.trim() === '') {
        showNotification('@config(qrcode.notifications.qrInvalid)', 'warning');
        return;
      }

      qrText = qrText.trim();
      const isUrl = isValidUrl(qrText);

      // resultCard.style.display = "block";

      if (isUrl) {
        // resultText.innerHTML = `🌐 <strong>Link Terdeteksi:</strong><br>${escapeHtml(qrText)}`;
        showNotification('@config(qrcode.notifications.qrSuccess)', 'success');

        // redirectContainer.innerHTML = `<button class="redirect-btn bg-gradient-to-r from-blue-600 to-blue-500 border-none rounded-full px-5 py-2 text-white font-semibold text-sm cursor-pointer transition-all hover:scale-95 inline-flex items-center gap-1.5" id="manualRedirectBtn">🔗 Buka Link Sekarang</button>`;
        // const manualBtn = document.getElementById("manualRedirectBtn");
        // if (manualBtn) {
        //   manualBtn.addEventListener("click", () => {
        //     window.location.href = qrText;
        //   });
        // }

        // Authentikasi (redirect)
        setTimeout(() => {
          window.location.href = qrText;
        }, 1000);
      } else {
        let displayContent = '';
        let isHotspot = false;
        let wifiName = '',
          wifiPass = '';

        if (qrText.startsWith('WIFI:')) {
          isHotspot = true;
          const ssidMatch = qrText.match(/S:([^;]+)/);
          const passMatch = qrText.match(/P:([^;]+)/);
          const encMatch = qrText.match(/T:([^;]+)/);
          if (ssidMatch) wifiName = ssidMatch[1];
          if (passMatch) wifiPass = passMatch[1];
          const encryption = encMatch ? encMatch[1] : 'WPA';

          displayContent = `📶 <strong>KONFIGURASI HOTSPOT</strong><br>
          🔒 Enkripsi: ${encryption}<br>
          📡 SSID: ${wifiName}<br>
          🔑 Password: ${wifiPass ? wifiPass : '(tanpa password)'}<br>
          <span class="text-xs opacity-70">✨ Bukan link, tidak bisa redirect otomatis</span>`;

          showNotification(`Hotspot: ${wifiName} berhasil discan`, 'success');
        } else {
          displayContent = `📄 <strong>Data QR (bukan link)</strong><br>${escapeHtml(qrText)}<br>
          <span class="text-xs text-amber-500">⚠️ Bukan link yang valid, tidak bisa redirect</span>`;
          showNotification('@config(qrcode.notifications.qrInvalid)', 'warning');
        }

        // resultText.innerHTML = displayContent;
        // redirectContainer.innerHTML = "";

        if (isHotspot && wifiPass) {
          const copyBtn = document.createElement('button');
          copyBtn.className =
            'bg-slate-700 border-none rounded-full px-5 py-2 text-white font-semibold text-sm cursor-pointer transition-all hover:scale-95 inline-flex items-center gap-1.5';
          copyBtn.innerHTML = '📋 Copy Password';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(wifiPass);
            showNotification(
              'Password hotspot disalin ke clipboard!',
              'success'
            );
          };
          // redirectContainer.appendChild(copyBtn);
        } else if (!isUrl && !isHotspot && qrText.length > 0) {
          const copyTextBtn = document.createElement('button');
          copyTextBtn.className =
            'bg-slate-700 border-none rounded-full px-5 py-2 text-white font-semibold text-sm cursor-pointer transition-all hover:scale-95 inline-flex items-center gap-1.5';
          copyTextBtn.innerHTML = '📋 Copy Teks';
          copyTextBtn.onclick = () => {
            navigator.clipboard.writeText(qrText);
            showNotification('Teks QR disalin!', 'success');
          };
          // redirectContainer.appendChild(copyTextBtn);
        }
      }
    }

    // ===================== KAMERA & QR SCANNER =====================

    async function initAndStartCamera() {
      if (html5QrCode && isScanning) return;

      try {
        const readerElement = document.getElementById('reader');
        if (readerElement) readerElement.innerHTML = '';

        html5QrCode = new Html5Qrcode('reader');

        const config = {
          fps: 30,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 4 / 3,
          showTorchButtonIfSupported: true,
        };

        await html5QrCode.start(
          { facingMode: 'environment' },
          config,
          (decodedText) => {
            if (decodedText?.trim()) {
              processScannedQR(decodedText);
            }
          }
        );

        isScanning = true;
        showNotification('@config(qrcode.notifications.camStart)', 'info');
      } catch (err) {
        console.error('Start camera failed:', err);
        showNotification('@config(qrcode.notifications.camFailed)', 'error');
        html5QrCode = null;
        isScanning = false;
      }
    }

    async function stopCamera() {
      if (html5QrCode && isScanning) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
          isScanning = false;
          showNotification('@config(qrcode.notifications.camStop)', 'info');
        } catch (err) {
          console.warn('Stop error:', err);
        }
      }
      html5QrCode = null;
    }

    async function switchCamera() {
      if (!isScanning) {
        showNotification('@config(qrcode.notifications.camFailed)', 'warning');
        return;
      }

      if (!devicesList || devicesList.length < 2) {
        showNotification(
          '@config(qrcode.notifications.camNotAvailable)',
          'warning'
        );
        return;
      }

      try {
        let nextId;
        if (!currentCameraId) {
          nextId = devicesList[0].id;
        } else {
          const currentIdx = devicesList.findIndex(
            (d) => d.id === currentCameraId
          );
          const nextIdx = (currentIdx + 1) % devicesList.length;
          nextId = devicesList[nextIdx].id;
        }

        currentCameraId = nextId;

        await stopCamera();

        html5QrCode = new Html5Qrcode('reader');
        const config = {
          fps: 30,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 4 / 3,
          showTorchButtonIfSupported: true,
        };

        await html5QrCode.start(
          { deviceId: { exact: currentCameraId } },
          config,
          (decodedText) => {
            if (decodedText && decodedText.trim() !== '') {
              processScannedQR(decodedText);
            }
          }
        );

        isScanning = true;
        showNotification(
          `@config(qrcode.notifications.camSwitching)`,
          'success'
        );
      } catch (err) {
        console.error('Switch camera error:', err);
        showNotification(
          '@config(qrcode.notifications.camSwitchingFailed)',
          'error'
        );
        if (!isScanning) {
          initAndStartCamera().catch((e) => console.warn(e));
        }
      }
    }

    // ===================== UPLOAD FILE =====================
    // Drag & Drop
    const dropZone = document.getElementById('dropZone');
    // prevent default make drop work
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach((eventName) => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });

    // effect when drag in
    ['dragenter', 'dragover'].forEach((eventName) => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.add('border-blue-400', 'bg-slate-800/40');
      });
    });

    // back to default when out
    ['dragleave', 'drop'].forEach((eventName) => {
      dropZone.addEventListener(eventName, () => {
        dropZone.classList.remove('border-blue-400', 'bg-slate-800/40');
      });
    });

    // handle file drop
    dropZone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;

      if (files && files.length > 0) {
        fileInput.files = files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    function showImagePreview(file) {
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImg.src = e.target.result;
          previewStage.style.display = 'flex';
        };
        reader.readAsDataURL(file);
      } else {
        previewStage.style.display = 'none';
        previewImg.src = '';
      }
    }

    function hidePreview() {
      previewStage.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
    }

    async function onFileSelected(file) {
      if (!file) return;
      scanLine.classList.add('[animation-duration:1s]');

      const wasScanning = isScanning;
      if (wasScanning) {
        await stopCamera();
      }

      showImagePreview(file);
      // showNotification('Memproses gambar, mencari QR Code...', 'info');

      const tempScanner = new Html5Qrcode('reader');

      try {
        const result = await tempScanner.scanFile(file, true);
        if (result && result.trim() !== '') {
          processScannedQR(result);
          // showNotification('QR Code berhasil dibaca dari gambar!', 'success');
        } 
      } catch (err) {
        console.error('Scan file error:', err);
        showNotification('@config(qrcode.notifications.qrNotFound)', 'error');
        // resultCard.style.display = "none";
      } finally {
        try {
          await tempScanner.clear();
        } catch (e) {}
      }
    }

    async function backToCamera() {
      hidePreview();
      if (!isScanning) {
        await initAndStartCamera();
      }
    }

    // ===================== EVENT LISTENERS =====================
    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        onFileSelected(file);
      } else {
        hidePreview();
      }
    });

    closePreviewBtn.addEventListener('click', () => {
      scanLine.classList.add('[animation-duration:3s]');
      backToCamera();
    });

    switchBtn.addEventListener('click', () => {
      if (previewStage.style.display === 'flex') {
        backToCamera().then(() => {
          setTimeout(() => switchCamera(), 500);
        });
      } else {
        switchCamera();
      }
    });

    stopBtn.addEventListener('click', () => {
      stopCamera();
      hidePreview();
    });

    startBtn.addEventListener('click', () => {
      if (previewStage.style.display === 'flex') {
        backToCamera();
      } else if (!isScanning) {
        initAndStartCamera();
      } else {
        showNotification("@config(qrcode.notifications.camAlreadyActive)", "info");
      }
    });

    // ===================== INITIALIZATION =====================
    let initialized = false;

    window.addEventListener('load', () => {
      if (!initialized) {
        initialized = true;
        setTimeout(() => {
          initAndStartCamera().catch((err) => {
            console.error('Init camera failed:', err);
            showNotification(
              "@config(qrcode.notifications.camInitFailed)",
              "info"
            );
          });
        }, 100);
      }
    });

    window.addEventListener('beforeunload', async () => {
      if (html5QrCode && isScanning) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
        } catch (e) {}
      }
    });
    </script>
  </body>
</html>
