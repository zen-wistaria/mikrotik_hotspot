<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>QR Hotspot Scanner - Premium</title>

  <!-- <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script> -->
  <script src="../js/qrcode.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0B1120 0%, #0F172A 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .scanner-container {
      max-width: 650px;
      width: 100%;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 24px 20px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .title-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .title-section h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #E0E7FF, #67E8F9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .title-section h1::before {
      content: "📡";
      background: none;
      -webkit-background-clip: unset;
      color: #38BDF8;
    }

    .sub {
      color: #94A3B8;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .camera-stage {
      background: #000000;
      border-radius: 32px;
      overflow: hidden;
      margin: 16px 0 12px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
    }

    #reader {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
    }

    .preview-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .preview-stage img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .preview-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 11;
      backdrop-filter: blur(4px);
    }

    .preview-close:hover {
      background: rgba(220, 38, 38, 0.8);
    }

    /* Efek overlay scanning - SELALU TAMPIL */
    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 32px;
      z-index: 20;
    }

    .scan-overlay::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 2px solid rgba(56, 189, 248, 0.6);
      border-radius: 20px;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.3), 0 0 20px rgba(56, 189, 248, 0.3);
      animation: scanPulse 2s ease-in-out infinite;
    }

    .scan-overlay::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 20px;
      right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #38BDF8, #7DD3FC, transparent);
      transform: translateY(-50%);
      animation: scanLine 2.5s ease-in-out infinite;
      opacity: 0.7;
    }

    .camera-stage.scanning-image .scan-overlay::after {
        animation-duration: 1s; /* lebih cepat biar terasa scan */
    }

    @keyframes scanPulse {
      0%, 100% { opacity: 0.5; border-color: #38BDF8; }
      50% { opacity: 1; border-color: #BAE6FD; }
    }

    @keyframes scanLine {
      0% { top: 15%; opacity: 0; }
      10% { opacity: 0.8; }
      50% { top: 85%; opacity: 0.8; }
      90% { opacity: 0.5; }
      100% { top: 15%; opacity: 0; }
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 18px;
    }

    .btn {
      padding: 11px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(4px);
      color: #F1F5F9;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(95deg, #2563EB, #3B82F6);
      color: white;
      box-shadow: 0 8px 18px -6px #1e3a8a;
    }

    .btn-primary:hover {
      background: linear-gradient(95deg, #1D4ED8, #2563EB);
      transform: scale(0.97);
    }

    .btn-outline {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #334155;
    }

    .btn-outline:hover {
      background: #1E293B;
      border-color: #5B6e9e;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: rgba(220, 38, 38, 0.85);
    }

    .btn-danger:hover {
      background: #B91C1C;
    }

    .upload-area {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 60px;
      padding: 12px 16px;
      backdrop-filter: blur(8px);
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .upload-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .file-label {
      color: #CBD5E1;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #fileInput {
      background: #0F172A;
      color: white;
      border-radius: 40px;
      padding: 8px 15px;
      font-size: 0.75rem;
      border: 1px solid #2D3A5E;
      cursor: pointer;
      max-width: 200px;
    }

    .notif {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 60px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      border-left: 4px solid;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .notif.success {
      background: rgba(34, 197, 94, 0.2);
      border-left-color: #22C55E;
      color: #DCFCE7;
      display: flex;
    }

    .notif.error {
      background: rgba(239, 68, 68, 0.2);
      border-left-color: #EF4444;
      color: #FEE2E2;
      display: flex;
    }

    .notif.warning {
      background: rgba(245, 158, 11, 0.2);
      border-left-color: #F59E0B;
      color: #FEF3C7;
      display: flex;
    }

    .notif.info {
      background: rgba(59, 130, 246, 0.2);
      border-left-color: #3B82F6;
      color: #BFDBFE;
      display: flex;
    }

    .result-card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 24px;
      padding: 14px 18px;
      margin-top: 16px;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
    }

    .result-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94A3B8;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-content {
      font-family: 'Courier New', monospace;
      word-break: break-all;
      color: #E2E8F0;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .redirect-action {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .redirect-btn {
      background: linear-gradient(95deg, #2563EB, #3B82F6);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .redirect-btn:hover {
      background: linear-gradient(95deg, #1D4ED8, #2563EB);
      transform: scale(0.96);
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 24px;
      color: #475569;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }
      .scanner-container {
        padding: 16px 15px 24px;
        border-radius: 32px;
      }
      .btn {
        padding: 8px 14px;
        font-size: 0.75rem;
      }
      .title-section h1 {
        font-size: 1.4rem;
      }
      .upload-header {
        flex-direction: column;
        align-items: stretch;
      }
      #fileInput {
        max-width: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="scanner-container">
  <div class="title-section">
    <h1>QR Hotspot Scanner</h1>
    <div class="sub">Arahkan QR Code ke area kamera • Auto redirect untuk link</div>
  </div>

  <div class="camera-stage">
    <div id="reader"></div>
    <div id="previewStage" class="preview-stage">
      <button class="preview-close" id="closePreviewBtn">✕</button>
      <img id="previewImg" alt="Preview QR">
    </div>
    <div class="scan-overlay"></div>
  </div>

  <div class="button-group">
    <button type="button" class="btn btn-primary" id="switchCamBtn">
      🔄 Ganti Kamera
    </button>
    <button type="button" class="btn btn-outline" id="stopCamBtn">
      ⏹️ Stop
    </button>
    <button type="button" class="btn btn-outline" id="startCamBtn">
      ▶️ Start
    </button>
  </div>

  <div class="upload-area">
    <div class="upload-header">
      <span class="file-label">📂 Scan dari Gambar:</span>
      <input type="file" id="fileInput" accept="image/*">
    </div>
  </div>

  <div id="notif" class="notif"></div>
  
  <div id="resultCard" class="result-card">
    <div class="result-label">
      <span>🔍 HASIL SCAN</span>
    </div>
    <div id="resultText" class="result-content"></div>
    <div id="redirectContainer" class="redirect-action"></div>
  </div>
  
  <footer>✦ QR otomatis • Link akan langsung redirect • Hotspot ditampilkan ✦</footer>
</div>

<script />
  // ======================= KONFIGURASI =======================
  let html5QrCode = null;
  let currentCameraId = null;
  let isScanning = false;
  let devicesList = [];
  
  // DOM Elements
  const notifDiv = document.getElementById("notif");
  const resultCard = document.getElementById("resultCard");
  const resultText = document.getElementById("resultText");
  const redirectContainer = document.getElementById("redirectContainer");
  const switchBtn = document.getElementById("switchCamBtn");
  const stopBtn = document.getElementById("stopCamBtn");
  const startBtn = document.getElementById("startCamBtn");
  const fileInput = document.getElementById("fileInput");
  const previewStage = document.getElementById("previewStage");
  const previewImg = document.getElementById("previewImg");
  const closePreviewBtn = document.getElementById("closePreviewBtn");

  function showNotification(message, type = "info") {
    notifDiv.className = "notif " + type;
    notifDiv.innerHTML = `<span>${type === "success" ? "✅" : type === "error" ? "⚠️" : type === "warning" ? "⚠️" : "ℹ️"}</span> ${message}`;
    notifDiv.style.display = "flex";
    
    setTimeout(() => {
      if (notifDiv && notifDiv.style.display === "flex") {
        notifDiv.style.display = "none";
      }
    }, type === "error" ? 4000 : 2800);
  }

  function isValidUrl(string) {
    if (!string) return false;
    string = string.trim();
    try {
      let url = string;
      if (!string.startsWith('http://') && !string.startsWith('https://') && !string.startsWith('ftp://')) {
        url = 'https://' + string;
      }
      const urlObj = new URL(url);
      return (urlObj.protocol === 'http:' || urlObj.protocol === 'https:' || urlObj.protocol === 'ftp:');
    } catch (e) {
      return false;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function processScannedQR(qrText) {
    if (!qrText || qrText.trim() === "") {
      showNotification("QR Code kosong atau tidak valid", "warning");
      return;
    }
    
    qrText = qrText.trim();
    const isUrl = isValidUrl(qrText);
    
    resultCard.style.display = "block";
    
    if (isUrl) {
      resultText.innerHTML = `🌐 <strong>Link Terdeteksi:</strong><br>${escapeHtml(qrText)}`;
      showNotification("Link terdeteksi! Mengalihkan...", "success");
      
      redirectContainer.innerHTML = `<button class="redirect-btn" id="manualRedirectBtn">🔗 Buka Link Sekarang</button>`;
      const manualBtn = document.getElementById("manualRedirectBtn");
      if (manualBtn) {
        manualBtn.addEventListener("click", () => {
          window.location.href = qrText;
        });
      }
      
      setTimeout(() => {
        window.location.href = qrText;
      }, 1000);
      
    } 
    else {
      let displayContent = "";
      let isHotspot = false;
      let wifiName = "", wifiPass = "";
      
      if (qrText.startsWith("WIFI:")) {
        isHotspot = true;
        const ssidMatch = qrText.match(/S:([^;]+)/);
        const passMatch = qrText.match(/P:([^;]+)/);
        const encMatch = qrText.match(/T:([^;]+)/);
        if (ssidMatch) wifiName = ssidMatch[1];
        if (passMatch) wifiPass = passMatch[1];
        const encryption = encMatch ? encMatch[1] : "WPA";
        
        displayContent = `📶 <strong>KONFIGURASI HOTSPOT</strong><br>
        🔒 Enkripsi: ${encryption}<br>
        📡 SSID: ${wifiName}<br>
        🔑 Password: ${wifiPass ? wifiPass : "(tanpa password)"}<br>
        <span style="font-size:0.75rem; opacity:0.7;">✨ Bukan link, tidak bisa redirect otomatis</span>`;
        
        showNotification(`Hotspot: ${wifiName} berhasil discan`, "success");
      } 
      else {
        displayContent = `📄 <strong>Data QR (bukan link)</strong><br>${escapeHtml(qrText)}<br>
        <span style="font-size:0.75rem; color:#F59E0B;">⚠️ Bukan link yang valid, tidak bisa redirect</span>`;
        showNotification("QR Code bukan link yang valid.", "warning");
      }
      
      resultText.innerHTML = displayContent;
      redirectContainer.innerHTML = "";
      
      if (isHotspot && wifiPass) {
        const copyBtn = document.createElement("button");
        copyBtn.className = "redirect-btn";
        copyBtn.style.background = "#2D3748";
        copyBtn.innerHTML = "📋 Copy Password";
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(wifiPass);
          showNotification("Password hotspot disalin ke clipboard!", "success");
        };
        redirectContainer.appendChild(copyBtn);
      } else if (!isUrl && !isHotspot && qrText.length > 0) {
        const copyTextBtn = document.createElement("button");
        copyTextBtn.className = "redirect-btn";
        copyTextBtn.style.background = "#334155";
        copyTextBtn.innerHTML = "📋 Copy Teks";
        copyTextBtn.onclick = () => {
          navigator.clipboard.writeText(qrText);
          showNotification("Teks QR disalin!", "success");
        };
        redirectContainer.appendChild(copyTextBtn);
      }
    }
  }
  
  // ===================== KAMERA & QR SCANNER =====================
  
  async function initAndStartCamera() {
  if (html5QrCode && isScanning) return;

  try {
    const readerElement = document.getElementById("reader");
    if (readerElement) readerElement.innerHTML = "";

    html5QrCode = new Html5Qrcode("reader");

    const config = {
      fps: 30,
      qrbox: { width: 280, height: 280 },
      aspectRatio: 4 / 3,
      showTorchButtonIfSupported: true
    };

    await html5QrCode.start(
      { facingMode: "environment" },
      config,
      (decodedText) => {
        if (decodedText?.trim()) {
          processScannedQR(decodedText);
        }
      }
    );

    isScanning = true;
    showNotification("Kamera aktif", "info");

  } catch (err) {
    console.error("Start kamera gagal:", err);
    showNotification("Gagal akses kamera", "error");
    html5QrCode = null;
    isScanning = false;
  }
}
  
  async function stopCamera() {
    if (html5QrCode && isScanning) {
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        isScanning = false;
        showNotification("Kamera dihentikan", "info");
      } catch (err) {
        console.warn("Stop error:", err);
      }
    }
    html5QrCode = null;
  }
  
  async function restartCamera() {
    await stopCamera();
    await initAndStartCamera();
  }
  
  async function switchCamera() {
    if (!isScanning) {
      showNotification("Kamera tidak aktif, mulai dulu", "warning");
      return;
    }
    
    if (!devicesList || devicesList.length < 2) {
      showNotification("Tidak ada kamera lain yang tersedia", "warning");
      return;
    }
    
    try {
      let nextId;
      if (!currentCameraId) {
        nextId = devicesList[0].id;
      } else {
        const currentIdx = devicesList.findIndex(d => d.id === currentCameraId);
        const nextIdx = (currentIdx + 1) % devicesList.length;
        nextId = devicesList[nextIdx].id;
      }
      
      currentCameraId = nextId;
      
      // Restart dengan kamera baru
      await stopCamera();
      
      html5QrCode = new Html5Qrcode("reader");
      const config = {
        fps: 30,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 4/3,
        showTorchButtonIfSupported: true
      };
      
      await html5QrCode.start(
        { deviceId: { exact: currentCameraId } },
        config,
        (decodedText) => {
          if (decodedText && decodedText.trim() !== "") {
            processScannedQR(decodedText);
          }
        },
        (errorMsg) => {
          console.debug("Scan frame error:", errorMsg);
        }
      );
      
      isScanning = true;
      showNotification(`Berpindah kamera`, "success");
      
    } catch (err) {
      console.error("Switch camera error:", err);
      showNotification("Gagal beralih kamera", "error");
      if (!isScanning) {
        initAndStartCamera().catch(e => console.warn);
      }
    }
  }
  
  // ===================== UPLOAD FILE =====================
  function showImagePreview(file) {
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImg.src = e.target.result;
        previewStage.style.display = "flex";
      };
      reader.readAsDataURL(file);
    } else {
      previewStage.style.display = "none";
      previewImg.src = "";
    }
  }
  
  function hidePreview() {
    previewStage.style.display = "none";
    previewImg.src = "";
    fileInput.value = "";
  }
  
  async function onFileSelected(file) {
    if (!file) return;

    const stage = document.querySelector(".camera-stage");
    stage.classList.add("scanning-image");
    
    const wasScanning = isScanning;
    if (wasScanning) {
      await stopCamera();
    }
    
    // Tampilkan preview
    showImagePreview(file);
    
    showNotification("Memproses gambar, mencari QR Code...", "info");
    
    const tempScanner = new Html5Qrcode("reader");
    
    try {
      const result = await tempScanner.scanFile(file, true);
      if (result && result.trim() !== "") {
        processScannedQR(result);
        showNotification("QR Code berhasil dibaca dari gambar!", "success");
      } else {
        showNotification("Tidak ada QR Code yang ditemukan pada gambar", "warning");
        resultCard.style.display = "none";
      }
    } catch (err) {
      console.error("Scan file error:", err);
      showNotification("Gagal membaca QR dari gambar", "error");
      resultCard.style.display = "none";
    } finally {
      try {
        await tempScanner.clear();
      } catch(e) {}
    }
  }
  
  async function backToCamera() {
    hidePreview();
    if (!isScanning) {
      await initAndStartCamera();
    }
  }
  
  // ===================== EVENT LISTENERS =====================
  fileInput.addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (file) {
      onFileSelected(file);
    } else {
      hidePreview();
    }
  });
  
  closePreviewBtn.addEventListener("click", () => {
    backToCamera();
  });
  
  switchBtn.addEventListener("click", () => {
    if (previewStage.style.display === "flex") {
      backToCamera().then(() => {
        setTimeout(() => switchCamera(), 500);
      });
    } else {
      switchCamera();
    }
  });
  
  stopBtn.addEventListener("click", () => {
    stopCamera();
    hidePreview();
  });
  
  startBtn.addEventListener("click", () => {
    if (previewStage.style.display === "flex") {
      backToCamera();
    } else if (!isScanning) {
      initAndStartCamera();
    } else {
      showNotification("Kamera sudah aktif", "info");
    }
  });
  
  // ===================== INITIALIZATION =====================
  let initialized = false;
  
  window.addEventListener("load", () => {
    if (!initialized) {
      initialized = true;
      setTimeout(() => {
        initAndStartCamera().catch(err => {
          console.error("Init camera failed:", err);
          showNotification("Klik tombol Start untuk mengaktifkan kamera", "info");
        });
      }, 100);
    }
  });
  
  window.addEventListener("beforeunload", async () => {
    if (html5QrCode && isScanning) {
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
      } catch(e) {}
    }
  });
</script>
</body>
</html>
