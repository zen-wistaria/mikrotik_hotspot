<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>@config(qrcode.meta.title)</title>
    <meta name="description" content="@config(qrcode.meta.description)">
    <link rel="stylesheet" href="../css/style.css">
    <script src="qrcode.js"></script>
    <script src="../js/app.js" defer></script>
  </head>

  <body class="bg-stone-50 text-zinc-900 dark:bg-zinc-900 dark:text-stone-100 font-space min-h-screen flex items-center justify-center overflow-x-hidden p-4">

    <!-- Theme Toggle -->
    <button
      class="theme-toggle fixed top-4 right-4 w-10 h-10 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 flex items-center justify-center bg-stone-50 dark:bg-zinc-900 z-50 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors"
      title="Toggle Theme" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 fill-current" viewBox="0 0 24 24">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41z" />
      </svg>
    </button>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-stone-50 dark:bg-zinc-900 z-50 hidden items-center justify-center">
      <div class="w-10 h-10 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 animate-spin"></div>
    </div>

    <div class="border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 p-6 md:p-8 w-full max-w-md mx-auto">
      <!-- Header -->
      <div class="mb-5 text-center">
        <h1 class="text-xl font-space tracking-widest text-zinc-900 dark:text-stone-100 uppercase">
          @config(qrcode.title)
        </h1>
        <div class="mt-1 text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">
          @config(qrcode.description)
        </div>
      </div>

      <!-- Camera Stage -->
      <div class="relative overflow-hidden my-4 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 aspect-[4/3]">
        <div id="reader" class="w-full h-full bg-gray-100 dark:bg-gray-900"></div>

        <!-- Preview Stage -->
        <div id="previewStage" class="absolute top-0 left-0 z-10 items-center justify-center hidden w-full h-full bg-gray-100 dark:bg-gray-900">
          <button type="button" id="closePreviewBtn" class="absolute top-2.5 right-2.5 bg-zinc-900 dark:bg-stone-50 text-stone-50 dark:text-zinc-900 w-8 h-8 text-lg flex items-center justify-center z-20 hover:opacity-80 transition-opacity">✕</button>
          <img id="previewImg" alt="Preview QR" class="object-contain max-w-full max-h-full">
        </div>

        <!-- Scan Overlay -->
        <div class="absolute top-0 left-0 z-20 w-full h-full pointer-events-none">
          <div class="absolute top-1/2 left-5 right-5 h-px bg-zinc-900 dark:bg-stone-50 -translate-y-1/2 animate-scan-line opacity-70"></div>
        </div>
      </div>

      <!-- Button Group -->
      <div class="flex flex-wrap justify-center gap-3 my-5">
        <button type="button" id="switchCamBtn" class="px-5 py-2.5 text-xs uppercase tracking-widest border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 text-zinc-900 dark:text-stone-100 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors flex items-center gap-2">
          @config(qrcode.button.switchCam)
        </button>
        <button type="button" id="stopCamBtn" class="px-5 py-2.5 text-xs uppercase tracking-widest border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 text-zinc-900 dark:text-stone-100 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors flex items-center gap-2">
          @config(qrcode.button.stopCam)
        </button>
        <button type="button" id="startCamBtn" class="px-5 py-2.5 text-xs uppercase tracking-widest border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-zinc-900 dark:border-zinc-700 text-zinc-900 dark:text-stone-100 hover:bg-zinc-800 hover:text-stone-50 active:translate-y-1 active:shadow-none dark:hover:bg-stone-50 dark:hover:text-zinc-900 transition-colors flex items-center gap-2">
          @config(qrcode.button.startCam)
        </button>
      </div>

      <!-- Upload Area -->
      <div>
        <label id="dropZone" for="fileInput" class="flex flex-col items-center justify-center gap-2 p-4 border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-dashed border-zinc-900 dark:border-zinc-700 cursor-pointer hover:bg-zinc-900/5 dark:hover:bg-stone-50/5 transition-colors">
          <span class="text-2xl">📂</span>
          <span class="text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">@config(qrcode.text.scanFromFile)</span>
        </label>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- Notification -->
      <div id="notifContainer" class="z-40 hidden flex-col items-center justify-center w-full gap-3 mt-4 text-sm rounded-lg animate-slide-in"></div>

      <button class="w-full px-6 py-4 rounded-xl border-2 border-stone-50 dark:border-zinc-900 shadow-brutal dark:shadow-brutal-dark bg-zinc-900 text-stone-50 dark:bg-stone-50 dark:text-zinc-900 text-sm uppercase tracking-widest hover:bg-zinc-800 dark:hover:bg-stone-200 transition-all active:translate-y-1 active:shadow-none flex items-center justify-center gap-2 mt-4" type="button" onclick="window.history.back()">
        Kembali
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </button>

      <footer class="mt-6 text-xs text-center text-gray-500 dark:text-gray-400">
        @config(qrcode.footer)
      </footer>
    </div>

    <script>
    // ======================= KONFIGURASI =======================
    let html5QrCode = null;
    let currentCameraId = null;
    let isScanning = false;
    const devicesList = [];

    // DOM Elements
    const notifContainer = document.querySelector('#notifContainer');
    const switchBtn = document.querySelector('#switchCamBtn');
    const stopBtn = document.querySelector('#stopCamBtn');
    const startBtn = document.querySelector('#startCamBtn');
    const fileInput = document.querySelector('#fileInput');
    const previewStage = document.querySelector('#previewStage');
    const previewImg = document.querySelector('#previewImg');
    const closePreviewBtn = document.querySelector('#closePreviewBtn');
    const scanLine = document.querySelector('.animate-scan-line');

    function getNotificationStyle(type) {
      const styles = {
        success: 'border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-green-500 text-green-600 dark:text-green-400',
        error: 'border-2 rounded-xl shadow-brutal-red dark:shadow-brutal-red border-red-500 text-red-600 dark:text-red-400',
        warning: 'border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-yellow-500 text-yellow-600 dark:text-yellow-400',
        info: 'border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark border-gray-500 text-gray-600 dark:text-gray-400',
      };
      return `py-3 px-4 w-full font-medium flex items-center gap-3 text-sm border-2 rounded-xl shadow-brutal dark:shadow-brutal-dark animate-slide-in ${styles[type] || styles.info}`;
    }

    function showNotification(message, type = 'info') {
      if (notifContainer.classList.contains('hidden')) {
        notifContainer.classList.remove('hidden');
        notifContainer.classList.add('flex');
      }
      const notif = document.createElement('div');
      notif.className = getNotificationStyle(type);
      const icon = type === 'success' ? '✅' : type === 'error' ? '⛔' : type === 'warning' ? '⚠️' : 'ℹ️';
      notif.innerHTML = `<span>${icon}</span> ${message}`;
      notifContainer.prepend(notif);
      setTimeout(() => {
        notif.classList.add('opacity-0', 'translate-y-2', 'transition-all', 'duration-300');
        setTimeout(() => {
          notif.remove();
          if (notifContainer.children.length === 0) {
            notifContainer.classList.add('hidden');
          }
        }, 300);
      }, type === 'error' ? 4000 : 2800);
      notif.addEventListener('click', () => {
        notif.remove();
        if (notifContainer.children.length === 0) {
          notifContainer.classList.add('hidden');
        }
      });
      const maxNotif = 4;
      if (notifContainer.children.length > maxNotif) {
        notifContainer.removeChild(notifContainer.lastChild);
      }
    }

    function isValidUrl(str) {
      if (!str) return false;
      try {
        const url = new URL(str.trim());
        if (url.protocol !== 'http:' && url.protocol !== 'https:') return false;
        const decodedQuery = decodeURIComponent(url.search).toLowerCase();
        const hasUser = /(?:\?|&)(username)=/i.test(decodedQuery);
        const hasPass = /(?:\?|&)(password)=/i.test(decodedQuery);
        return hasUser || hasPass;
      } catch (e) { return false; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, (m) => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function processScannedQR(qrText) {
      if (!qrText || qrText.trim() === '') {
        showNotification('@config(qrcode.notifications.qrInvalid)', 'warning');
        return;
      }
      qrText = qrText.trim();
      const isUrl = isValidUrl(qrText);
      if (isUrl) {
        showNotification('@config(qrcode.notifications.qrSuccess)', 'success');
        setTimeout(() => { window.location.href = qrText; }, 1000);
      } else {
        let isHotspot = false, wifiName = '', wifiPass = '';
        if (qrText.startsWith('WIFI:')) {
          isHotspot = true;
          const ssidMatch = qrText.match(/S:([^;]+)/);
          const passMatch = qrText.match(/P:([^;]+)/);
          if (ssidMatch) wifiName = ssidMatch[1];
          if (passMatch) wifiPass = passMatch[1];
          showNotification(`Hotspot: ${wifiName} berhasil discan`, 'success');
        } else {
          showNotification('@config(qrcode.notifications.qrInvalid)', 'warning');
        }
      }
    }

    async function initAndStartCamera() {
      if (html5QrCode && isScanning) return;
      try {
        const readerElement = document.getElementById('reader');
        if (readerElement) readerElement.innerHTML = '';
        html5QrCode = new Html5Qrcode('reader');
        const config = { fps: 30, qrbox: { width: 280, height: 280 }, aspectRatio: 4 / 3, showTorchButtonIfSupported: true };
        await html5QrCode.start({ facingMode: 'environment' }, config, (decodedText) => {
          if (decodedText?.trim()) processScannedQR(decodedText);
        });
        isScanning = true;
        showNotification('@config(qrcode.notifications.camStart)', 'info');
      } catch (err) {
        console.error('Start camera failed:', err);
        showNotification(`@config(qrcode.notifications.camFailed): ${err}`, 'error');
        html5QrCode = null; isScanning = false;
      }
    }

    async function stopCamera() {
      if (html5QrCode && isScanning) {
        try { await html5QrCode.stop(); await html5QrCode.clear(); isScanning = false; showNotification('@config(qrcode.notifications.camStop)', 'info'); } catch (err) { console.warn('Stop error:', err); }
      }
      html5QrCode = null;
    }

    async function switchCamera() {
      if (!isScanning) { showNotification('@config(qrcode.notifications.camFailed)', 'warning'); return; }
      if (!devicesList || devicesList.length < 2) { showNotification('@config(qrcode.notifications.camNotAvailable)', 'warning'); return; }
      try {
        let nextId;
        if (!currentCameraId) { nextId = devicesList[0].id; } else { const currentIdx = devicesList.findIndex(d => d.id === currentCameraId); nextId = devicesList[(currentIdx + 1) % devicesList.length].id; }
        currentCameraId = nextId;
        await stopCamera();
        html5QrCode = new Html5Qrcode('reader');
        const config = { fps: 30, qrbox: { width: 280, height: 280 }, aspectRatio: 4 / 3, showTorchButtonIfSupported: true };
        await html5QrCode.start({ deviceId: { exact: currentCameraId } }, config, (decodedText) => { if (decodedText && decodedText.trim() !== '') processScannedQR(decodedText); });
        isScanning = true; showNotification('@config(qrcode.notifications.camSwitching)', 'success');
      } catch (err) { console.error('Switch camera error:', err); showNotification('@config(qrcode.notifications.camSwitchingFailed)', 'error'); if (!isScanning) initAndStartCamera().catch(e => console.warn(e)); }
    }

    const dropZone = document.getElementById('dropZone');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => { dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }); });
    ['dragenter', 'dragover'].forEach(eventName => { dropZone.addEventListener(eventName, () => { dropZone.classList.add('bg-zinc-900/5', 'dark:bg-stone-50/5'); }); });
    ['dragleave', 'drop'].forEach(eventName => { dropZone.addEventListener(eventName, () => { dropZone.classList.remove('bg-zinc-900/5', 'dark:bg-stone-50/5'); }); });
    dropZone.addEventListener('drop', e => { const files = e.dataTransfer.files; if (files && files.length > 0) { fileInput.files = files; fileInput.dispatchEvent(new Event('change')); } });

    function showImagePreview(file) {
      if (file) { const reader = new FileReader(); reader.onload = (e) => { previewImg.src = e.target.result; previewStage.style.display = 'flex'; }; reader.readAsDataURL(file); }
      else { previewStage.style.display = 'none'; previewImg.src = ''; }
    }

    function hidePreview() { previewStage.style.display = 'none'; previewImg.src = ''; fileInput.value = ''; }

    async function onFileSelected(file) {
      if (!file) return;
      const wasScanning = isScanning;
      if (wasScanning) await stopCamera();
      showImagePreview(file);
      const tempScanner = new Html5Qrcode('reader');
      try {
        const result = await tempScanner.scanFile(file, true);
        if (result && result.trim() !== '') processScannedQR(result);
      } catch (err) { console.error('Scan file error:', err); showNotification(`@config(qrcode.notifications.qrNotFound): ${err}`, 'error'); } finally { try { await tempScanner.clear(); } catch (e) {} }
    }

    async function backToCamera() { hidePreview(); if (!isScanning) await initAndStartCamera(); }

    fileInput.addEventListener('change', (event) => { const file = event.target.files[0]; if (file) onFileSelected(file); else hidePreview(); });
    closePreviewBtn.addEventListener('click', () => backToCamera());
    switchBtn.addEventListener('click', () => { if (previewStage.style.display === 'flex') { backToCamera().then(() => setTimeout(() => switchCamera(), 500)); } else { switchCamera(); } });
    stopBtn.addEventListener('click', () => { stopCamera(); hidePreview(); });
    startBtn.addEventListener('click', () => { if (previewStage.style.display === 'flex') backToCamera(); else if (!isScanning) initAndStartCamera(); else showNotification("@config(qrcode.notifications.camAlreadyActive)", "info"); });

    let initialized = false;
    window.addEventListener('load', () => {
      if (!initialized) { initialized = true; setTimeout(() => { initAndStartCamera().catch(err => { console.error('Init camera failed:', err); showNotification(`@config(qrcode.notifications.camInitFailed): ${err}`, "info"); }); }, 100); }
    });
    window.addEventListener('beforeunload', async () => { if (html5QrCode && isScanning) { try { await html5QrCode.stop(); await html5QrCode.clear(); } catch (e) {} } });
    </script>
  </body>
</html>
