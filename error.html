<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi | Error</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-dark-primary dark:text-white font-['Outfit',sans-serif] min-h-screen flex items-center justify-center overflow-x-hidden p-4 transition-all">
    <div class="bg-mesh"></div>

    <div class="glass-card">
        <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-full flex items-center justify-center mx-auto mb-8 animate-[pulse_2s_infinite]">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </div>
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold tracking-tight bg-linear-to-r from-red-500 to-orange-500 bg-clip-text text-transparent uppercase italic">System Error</h1>
            <p class="text-[10px] text-slate-400 dark:text-white/40 mt-1 uppercase tracking-widest leading-relaxed">The authentication protocol has encountered an anomaly.</p>
        </div>

        <div class="bg-red-500/5 border border-red-500/10 p-4 rounded-xl text-xs text-red-600 dark:text-red-400/80 mb-6 leading-relaxed">
            <div class="uppercase tracking-widest text-[9px] mb-1 font-bold text-red-500">Error Details</div>
            $(error)
        </div>

        <div class="text-[11px] text-slate-500 dark:text-white/40 mb-8 space-y-2 list-none p-0">
            <div class="flex items-center gap-2">
                <div class="w-1 h-1 bg-red-500 rounded-full"></div>
                Invalid credentials provided
            </div>
            <div class="flex items-center gap-2">
                <div class="w-1 h-1 bg-red-500 rounded-full"></div>
                Session limit reached
            </div>
            <div class="flex items-center gap-2">
                <div class="w-1 h-1 bg-red-500 rounded-full"></div>
                Network communication failure
            </div>
        </div>

        <button class="neon-btn group bg-none bg-red-500 hover:shadow-[0_0_25px_rgba(239,68,68,0.4)] uppercase tracking-widest text-sm italic" onclick="window.history.back()">
            Retry Protocol 
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>

        <div class="text-center mt-8 text-[9px] text-slate-400 dark:text-white/20 uppercase tracking-[0.2em]">
            Error Glyph: <span class="text-red-500/50">$(error)</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
