<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Hotspot - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for icons (Optional, handled with inline SVGs if needed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-animation"></div>

    <button class="theme-toggle" title="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post" style="display: none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script src="md5.js"></script>
    <script>
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
    </script>
    $(endif)

    <div class="glass-card">
        <div class="header">
            <h1>NEON LOGIN</h1>
            <p>$(if error == "")Welcome to $(server-name) Hotspot$(else)$(error)$(endif)</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-type="member">Member</button>
            <button class="tab-btn" data-type="voucher">Voucher</button>
        </div>

        <form name="login" action="$(link-login-only)" method="post"
            $(if chap-id) onSubmit="return doLogin()" $(endif)>
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />

            $(if error)
            <div class="error-msg">
                <i class="fas fa-circle-exclamation"></i> $(error)
            </div>
            $(endif)

            <div class="input-group">
                <label class="input-label" id="username-label">Username</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input name="username" type="text" value="$(username)" placeholder="Enter Username" required>
                </div>
            </div>

            <div class="input-group" id="password-group">
                <label class="input-label">Password</label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input name="password" type="password" placeholder="Enter Password">
                </div>
            </div>

            <button type="submit" class="btn-primary">
                CONNECT NOW <i class="fas fa-arrow-right-to-bracket" style="margin-left: 10px;"></i>
            </button>
        </form>

        <div class="additional-actions">
            $(if trial == 'yes')
            <button class="btn-secondary" onclick="document.location='$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)'">
                <i class="fas fa-bolt" style="color: #ffde00;"></i> FREE TRIAL ACCESS
            </button>
            $(endif)

            <button class="btn-secondary" onclick="window.open('https://laksa19.github.io/?myqr', '_blank')">
                <i class="fas fa-qrcode"></i> SCAN QR CODE
            </button>
        </div>

        <div style="text-align: center; margin-top: 25px; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">
            Powered by MikroTik RouterOS
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
